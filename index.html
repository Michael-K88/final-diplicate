<!doctype html>
<html lang="en" dir="auto">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/deriv-logo.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="title" content="Blue Traders | Automated Trading Bot Builder" />
        <meta
            name="description"
            content="Build automated trading strategies with Blue Traders. Create, import, and manage trading bots with our visual builder. Start trading smarter today!"
        />
        <meta property="og:title" content="Blue Traders" />
        <meta
            property="og:description"
            content="Build automated trading strategies with Blue Traders. Create, import, and manage trading bots with our visual builder."
        />
        <title>Blue Traders | bluetraders.site</title>
        <style>
            :root {
                font-size: 62.5%;
            }

            #splash-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(180deg, #0a1628 0%, #0d1f33 40%, #091420 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 99999;
                font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                transition: opacity 0.5s ease-out;
            }
            #splash-screen.fade-out {
                opacity: 0;
                pointer-events: none;
            }

            .splash-logo-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 16px;
            }
            .splash-logo-icon {
                width: 64px;
                height: 64px;
                margin-bottom: 8px;
            }
            .splash-logo-icon svg {
                width: 100%;
                height: 100%;
            }
            .splash-title {
                font-size: 36px;
                font-weight: 800;
                color: #ffffff;
                text-align: center;
                letter-spacing: 2px;
                margin-bottom: 40px;
                text-transform: uppercase;
                line-height: 1.2;
            }
            .splash-title span {
                color: #4d88b8;
            }

            .splash-market-card {
                width: 380px;
                max-width: 90vw;
                background: rgba(10, 22, 40, 0.85);
                border: 1px solid rgba(77, 136, 184, 0.3);
                border-radius: 12px;
                padding: 24px;
                margin-bottom: 40px;
            }
            .splash-market-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }
            .splash-market-title {
                font-size: 12px;
                font-weight: 700;
                color: #8899aa;
                letter-spacing: 2px;
                text-transform: uppercase;
            }
            .splash-connected {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 11px;
                font-weight: 600;
                color: #ff6b35;
                letter-spacing: 1px;
            }
            .splash-connected-dot {
                width: 7px;
                height: 7px;
                background: #ff6b35;
                border-radius: 50%;
                animation: pulse-dot 1.5s ease-in-out infinite;
            }
            @keyframes pulse-dot {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.4; }
            }

            .splash-chart {
                display: flex;
                align-items: flex-end;
                gap: 6px;
                height: 100px;
                margin-bottom: 20px;
                padding: 0 4px;
            }
            .splash-bar {
                flex: 1;
                background: linear-gradient(180deg, #336699 0%, #1a3d5c 100%);
                border-radius: 3px 3px 0 0;
                min-width: 12px;
                animation: bar-grow 1.5s ease-out forwards;
                transform-origin: bottom;
            }
            @keyframes bar-grow {
                from { transform: scaleY(0); }
                to { transform: scaleY(1); }
            }

            .splash-chart-line {
                position: absolute;
                width: calc(100% - 8px);
                height: 100px;
                left: 4px;
            }

            .splash-price-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .splash-pair-badge {
                background: #003366;
                color: #ffffff;
                padding: 6px 14px;
                border-radius: 6px;
                font-size: 13px;
                font-weight: 700;
                letter-spacing: 1px;
            }
            .splash-price {
                font-size: 28px;
                font-weight: 700;
                color: #ffffff;
                font-family: 'Courier New', monospace;
                letter-spacing: 3px;
            }
            .splash-realtime-badge {
                border: 1px solid #ff6b35;
                color: #ff6b35;
                padding: 5px 12px;
                border-radius: 6px;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1.5px;
            }

            .splash-progress-container {
                width: 380px;
                max-width: 90vw;
                margin-bottom: 16px;
            }
            .splash-progress-bar {
                height: 5px;
                border-radius: 3px;
                background: rgba(255, 255, 255, 0.1);
                overflow: hidden;
                position: relative;
            }
            .splash-progress-fill {
                height: 100%;
                border-radius: 3px;
                background: linear-gradient(90deg, #003366, #006699, #00cc99, #ffcc00, #ff6633, #cc3366);
                background-size: 300% 100%;
                animation: progress-fill 3s ease-out forwards, gradient-shift 2s linear infinite;
                width: 0%;
            }
            @keyframes progress-fill {
                0% { width: 0%; }
                30% { width: 45%; }
                60% { width: 70%; }
                80% { width: 85%; }
                100% { width: 100%; }
            }
            @keyframes gradient-shift {
                0% { background-position: 0% 50%; }
                100% { background-position: 100% 50%; }
            }

            .splash-status-text {
                text-align: center;
                font-size: 13px;
                color: #667788;
                margin-bottom: 8px;
                letter-spacing: 0.5px;
            }
            .splash-status-main {
                text-align: center;
                font-size: 16px;
                color: #4d88b8;
                font-weight: 700;
                letter-spacing: 0.5px;
            }
        </style>
      <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').catch(function(err){
            console.warn('SW registration failed', err);
          });
        });
      }
    </script>
  </head>

                    <div class="splash-bar" style="height:70%; animation-delay:0.85s"></div>
                </div>
                <div class="splash-price-row">
                    <div class="splash-pair-badge">EUR/USD</div>
                    <div class="splash-price">1.2359</div>
                    <div class="splash-realtime-badge">REAL-TIME</div>
                </div>
            </div>

            <div class="splash-progress-container">
                <div class="splash-progress-bar">
                    <div class="splash-progress-fill"></div>
                </div>
            </div>
            <div class="splash-status-text">Connecting to global markets...</div>
            <div class="splash-status-main">Connecting to global markets</div>
        </div>

        <div id="modal_root" class="modal-root"></div>
        <div id="popup_root" class="popup-root"></div>
        <div id="root"></div>
