<!doctype html>
<html lang="en" dir="auto">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/deriv-logo.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="title" content="Blue Traders | Automated Trading Bot Builder" />
        <meta
            name="description"
            content="Build automated trading strategies with Blue Traders. Create, import, and manage trading bots with our visual builder. Start trading smarter today!"
        />
        <meta property="og:title" content="Blue Traders" />
        <meta
            property="og:description"
            content="Build automated trading strategies with Blue Traders. Create, import, and manage trading bots with our visual builder."
        />
        <title>Blue Traders | bluetraders.site</title>
        <style>
            :root {
                font-size: 62.5%;
            }

            #splash-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #050d1a;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 99999;
                font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                transition: opacity 0.6s ease-out;
                overflow: hidden;
            }
            #splash-screen.fade-out {
                opacity: 0;
                pointer-events: none;
            }

            .splash-bg-glow {
                position: absolute;
                border-radius: 50%;
                filter: blur(80px);
                opacity: 0.3;
                animation: glow-float 6s ease-in-out infinite alternate;
            }
            .splash-glow-1 {
                width: 400px;
                height: 400px;
                background: radial-gradient(circle, #003366 0%, transparent 70%);
                top: -100px;
                left: -100px;
            }
            .splash-glow-2 {
                width: 350px;
                height: 350px;
                background: radial-gradient(circle, #0066cc 0%, transparent 70%);
                bottom: -80px;
                right: -80px;
                animation-delay: 3s;
            }
            .splash-glow-3 {
                width: 200px;
                height: 200px;
                background: radial-gradient(circle, #00aaff 0%, transparent 70%);
                top: 30%;
                right: 20%;
                animation-delay: 1.5s;
            }
            @keyframes glow-float {
                0% { transform: translate(0, 0) scale(1); }
                100% { transform: translate(20px, -20px) scale(1.15); }
            }

            .splash-particles {
                position: absolute;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            .splash-particle {
                position: absolute;
                width: 2px;
                height: 2px;
                background: rgba(100, 180, 255, 0.6);
                border-radius: 50%;
                animation: particle-rise linear infinite;
            }
            @keyframes particle-rise {
                0% { transform: translateY(100vh) scale(0); opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                100% { transform: translateY(-10vh) scale(1); opacity: 0; }
            }

            .splash-content {
                position: relative;
                z-index: 2;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .splash-logo-ring {
                width: 100px;
                height: 100px;
                position: relative;
                margin-bottom: 32px;
            }
            .splash-ring-outer {
                position: absolute;
                width: 100%;
                height: 100%;
                border: 2px solid rgba(0, 102, 204, 0.3);
                border-radius: 50%;
                animation: ring-spin 8s linear infinite;
            }
            .splash-ring-outer::before {
                content: '';
                position: absolute;
                top: -2px;
                left: 50%;
                width: 8px;
                height: 8px;
                background: #0099ff;
                border-radius: 50%;
                transform: translateX(-50%);
                box-shadow: 0 0 12px #0099ff;
            }
            @keyframes ring-spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
            .splash-ring-inner {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 70px;
                height: 70px;
                background: linear-gradient(135deg, #003366, #004d99);
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 8px 32px rgba(0, 51, 102, 0.5);
            }
            .splash-ring-inner svg {
                width: 40px;
                height: 40px;
            }

            .splash-brand {
                text-align: center;
                margin-bottom: 48px;
            }
            .splash-welcome {
                font-size: 14px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.4);
                text-transform: uppercase;
                letter-spacing: 6px;
                margin-bottom: 8px;
            }
            .splash-name {
                font-size: 42px;
                font-weight: 800;
                background: linear-gradient(135deg, #ffffff 0%, #66b3ff 50%, #0099ff 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: 3px;
            }

            .splash-stats-row {
                display: flex;
                gap: 40px;
                margin-bottom: 48px;
            }
            .splash-stat {
                text-align: center;
            }
            .splash-stat-value {
                font-size: 28px;
                font-weight: 800;
                color: #ffffff;
                font-family: 'IBM Plex Mono', monospace;
            }
            .splash-stat-value .splash-stat-unit {
                font-size: 14px;
                color: #0099ff;
                font-weight: 600;
            }
            .splash-stat-label {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.35);
                text-transform: uppercase;
                letter-spacing: 2px;
                font-weight: 600;
                margin-top: 4px;
            }

            .splash-wave-container {
                width: 360px;
                max-width: 85vw;
                height: 48px;
                margin-bottom: 32px;
                display: flex;
                align-items: flex-end;
                gap: 3px;
            }
            .splash-wave-bar {
                flex: 1;
                background: linear-gradient(180deg, #0099ff, #003366);
                border-radius: 2px 2px 0 0;
                animation: wave-pulse 2s ease-in-out infinite;
                transform-origin: bottom;
            }
            @keyframes wave-pulse {
                0%, 100% { transform: scaleY(0.3); }
                50% { transform: scaleY(1); }
            }

            .splash-loader {
                width: 280px;
                max-width: 80vw;
                margin-bottom: 20px;
            }
            .splash-loader-track {
                height: 3px;
                background: rgba(255, 255, 255, 0.06);
                border-radius: 3px;
                overflow: hidden;
            }
            .splash-loader-fill {
                height: 100%;
                border-radius: 3px;
                background: linear-gradient(90deg, #003366, #0099ff, #00ccff);
                width: 0%;
                animation: loader-go 3s ease-out forwards;
            }
            @keyframes loader-go {
                0% { width: 0%; }
                20% { width: 30%; }
                50% { width: 60%; }
                80% { width: 85%; }
                100% { width: 100%; }
            }

            .splash-loading-text {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.3);
                text-align: center;
                letter-spacing: 3px;
                text-transform: uppercase;
                font-weight: 600;
                animation: text-blink 2s ease-in-out infinite;
            }
            @keyframes text-blink {
                0%, 100% { opacity: 0.3; }
                50% { opacity: 1; }
            }

            .splash-grid-bg {
                position: absolute;
                width: 100%;
                height: 100%;
                background-image:
                    linear-gradient(rgba(0, 102, 204, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 102, 204, 0.03) 1px, transparent 1px);
                background-size: 40px 40px;
            }
        </style>
      <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').catch(function(err){
            console.warn('SW registration failed', err);
          });
        });
      }
    </script>
  </head>

                        </svg>

                <div class="splash-brand">
                    <div class="splash-welcome">Welcome to</div>

                <div class="splash-stats-row">

                    <div class="splash-stat">

                <div class="splash-wave-container">

                <div class="splash-loader">

                </div>
                <div class="splash-loading-text">Initializing</div>
            </div>
        </div>

        <div id="modal_root" class="modal-root"></div>
        <div id="popup_root" class="popup-root"></div>
